
<!DOCTYPE html>
<html lang="ta">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Noto+Sans+Tamil:wght@400;700&display=swap" rel="stylesheet">

<title>Mount Carmel Church Ramapuram</title>

<style>
body { margin:0; font-family:'Poppins','Noto Sans Tamil',sans-serif; }

.light { background:#f5f5f5; color:#111; }
.dark { background:#0d0d0d; color:#fff; }

header {
    padding:15px;
    text-align:center;
    background:#8b0000;
    color:white;
}

/* TOP TEXT */
.top-lines {
    background:#222;
    color:white;
    text-align:center;
    padding:10px;
}

/* NAV */
nav {
    display:flex;
    justify-content:center;
    background:#8b0000;
}
nav a {
    color:white;
    padding:12px;
    text-decoration:none;
}

/* HERO */
.hero {
    height:100vh;
    background:url('jesus.jpg') center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
}
.hero-box {
    background:rgba(0,0,0,0.6);
    padding:20px;
    border-radius:10px;
}

/* SECTION */
section { padding:20px; text-align:center; }

/* BUTTON */
button {
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#8b0000;
    color:white;
}

/* FLOAT BUTTON */
.toggle {
    position:fixed;
    bottom:20px;
    right:20px;
    background:black;
    color:white;
    padding:12px;
    border-radius:50%;
}

/* FOOTER */
.footer {
    background:#8b0000;
    color:white;
    text-align:center;
    padding:10px;
}
</style>
</head>

<body class="light">

<div class="toggle" onclick="toggleMode()">🌙</div>

<header>MOUNT CARMEL CHURCH RAMAPURAM</header>

<div class="top-lines">
<p>Welcome to Mount Carmel Church</p>
<p>அன்புடன் வரவேற்கிறோம்</p>
<p>Feast - July 16</p>
</div>

<nav>
<a href="index.html">Home</a>
<a href="contact.html">Contact</a>
<a href="youtube.html">YouTube</a>
<a href="donate.html">Donate</a>
</nav>

<div class="hero">
<div class="hero-box">
<h1>Come to Me</h1>
<p>“என்னிடத்தில் வாருங்கள்”</p>
</div>
</div>

<section>
<h2>🎉 Feast Countdown</h2>
<div id="countdown"></div>
</section>

<section>
<h2>📍 Location</h2>
<iframe src="https://www.google.com/maps?q=Mount+Carmel+Church+Ramapuram&output=embed" width="100%" height="250"></iframe>
</section>

<footer class="footer">
புனித கார்மல் அன்னையே எங்களுக்காக வேண்டிக்கொள்ளும்
</footer>

<script>
function toggleMode(){
document.body.classList.toggle("dark");
document.body.classList.toggle("light");
}

function getNextFeast(){
let now=new Date();
let year=now.getFullYear();
let feast=new Date(year,6,16);
if(now>feast) feast=new Date(year+1,6,16);
return feast.getTime();
}

let feastDate=getNextFeast();

setInterval(()=>{
let now=new Date().getTime();
let d=feastDate-now;

let days=Math.floor(d/(1000*60*60*24));
let h=Math.floor((d%(1000*60*60*24))/(1000*60*60));
let m=Math.floor((d%(1000*60*60))/(1000*60));
let s=Math.floor((d%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
days+"d "+h+"h "+m+"m "+s+"s";

},1000);
</script>

</body>
</html>
