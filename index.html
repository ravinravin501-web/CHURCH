
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<title>Mount Carmel Church Ramapuram</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    transition: 0.3s;
}

/* DARK & LIGHT MODE */
.dark {
    background: #111;
    color: white;
}
.light {
    background: #f5f5f5;
    color: black;
}

/* HEADER */
header {
    padding: 15px;
    font-size: 20px;
    font-weight: 600;
    background: linear-gradient(45deg, #8b0000, #b22222);
    color: white;
    text-align: center;
    letter-spacing: 1px;
}

/* HERO SECTION WITH JESUS IMAGE */
.hero {
    height: 90vh;
    background: url('jesus.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
}
.hero div {
    background: rgba(0,0,0,0.6);
    padding: 25px;
    border-radius: 15px;
}

/* HEADINGS */
h1 {
    font-size: 38px;
}
h2 {
    color: #8b0000;
}

/* SECTIONS */
section {
    padding: 25px;
}

/* BUTTONS */
button {
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    background: #8b0000;
    color: white;
    font-size: 16px;
}

/* CONTACT */
.contact a {
    display: inline-block;
    padding: 12px;
    background: #25D366;
    color: white;
    text-decoration: none;
    border-radius: 25px;
}

/* GALLERY */
.gallery img {
    width: 45%;
    margin: 5px;
    border-radius: 10px;
}

/* TOGGLE BUTTON */
.toggle {
    position: fixed;
    top: 10px;
    right: 10px;
    background: black;
    color: white;
}
</style>
</head>

<body class="light">

<button class="toggle" onclick="toggleMode()">🌙</button>

<header>
MOUNT CARMEL CHURCH RAMAPURAM
</header>

<div class="hero">
    <div>
        <h1>“Come to Me”</h1>
        <p>Matthew 11:28</p>
        <button onclick="alert('God Bless You 🙏')">Join Us</button>
    </div>
</div>

<!-- MASS TIMINGS -->
<section>
<h2>⛪ Mass Timings</h2>
<p>Sunday: 6:00 AM & 9:00 AM</p>
<p>Weekdays: 6:30 AM</p>
</section>

<!-- MAP -->
<section>
<h2>📍 Location</h2>
<iframe 
src="https://www.google.com/maps?q=Mount+Carmel+Church+Ramapuram&output=embed"
width="100%" height="250" style="border:0;">
</iframe>
</section>

<!-- CONTACT -->
<section class="contact">
<h2>📞 Contact</h2>
<a href="https://wa.me/91XXXXXXXXXX">Chat on WhatsApp</a>
</section>

<!-- GALLERY -->
<section class="gallery">
<h2>📷 Gallery</h2>
<img src="church.jpg">
<img src="church2.jpg">
<br>
<a href="gallery.html">
<button>View More</button>
</a>
</section>

<script>
function toggleMode() {
    document.body.classList.toggle("dark");
    document.body.classList.toggle("light");
}
</script>

</body>
</html>
```
