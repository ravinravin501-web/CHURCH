
<!DOCTYPE html>
<html lang="ta">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Noto+Sans+Tamil:wght@400;700&display=swap" rel="stylesheet">

<title>Mount Carmel Church Ramapuram</title>

<style>
body {
    margin:0;
    font-family:'Poppins','Noto Sans Tamil',sans-serif;
    transition:0.4s;
}

.light { background:#f5f5f5; color:#111; }
.dark { background:#0d0d0d; color:#fff; }

/* HEADER */
header {
    padding:15px;
    text-align:center;
    background:#8b0000;
    color:white;
}

/* MENU BUTTON */
.menu-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    font-size: 24px;
    background: #8b0000;
    color: white;
    padding: 8px 12px;
    border-radius: 5px;
    cursor: pointer;
    z-index: 1000;
}

/* SIDEBAR */
.sidebar {
    height: 100%;
    width: 0;
    position: fixed;
    top: 0;
    left: 0;
    background: #111;
    overflow-x: hidden;
    transition: 0.3s;
    padding-top: 60px;
}

.sidebar a {
    display:block;
    padding:12px;
    color:white;
    text-decoration:none;
    font-size:18px;
}

.sidebar a:hover {
    background:#8b0000;
}

.closebtn {
    position:absolute;
    top:10px;
    right:15px;
    font-size:22px;
}

/* HERO */
.hero {
    height:100vh;
    background:url('jesus.jpg') center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.hero-box {
    background:rgba(0,0,0,0.6);
    padding:20px;
    border-radius:10px;
    text-align:center;
}

/* SECTION */
section { padding:20px; text-align:center; }

/* BUTTON */
button {
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#8b0000;
    color:white;
}

/* FLOAT NIGHT BUTTON */
.toggle {
    position:fixed;
    bottom:20px;
    right:20px;
    background:black;
    color:white;
    padding:12px;
    border-radius:50%;
}

/* FOOTER */
.footer {
    background:#8b0000;
    color:white;
    text-align:center;
    padding:10px;
}
</style>
</head>

<body class="light">

<!-- MENU -->
<div class="menu-btn" onclick="openMenu()">☰</div>

<div id="sidebar" class="sidebar">
<a href="javascript:void(0)" class="closebtn" onclick="closeMenu()">✖</a>
<a href="index.html">🏠 Home</a>
<a href="contact.html">📞 Contact</a>
<a href="youtube.html">🎥 YouTube</a>
<a href="donate.html">💝 Donate</a>
</div>

<!-- NIGHT MODE -->
<div class="toggle" onclick="toggleMode()">🌙</div>

<header>MOUNT CARMEL CHURCH RAMAPURAM</header>

<!-- HERO -->
<div class="hero">
<div class="hero-box">
<h1>Come to Me</h1>
<p>“என்னிடத்தில் வாருங்கள்”</p>
</div>
</div>

<!-- COUNTDOWN -->
<section>
<h2>🎉 Feast Countdown (July 16)</h2>
<div id="countdown"></div>
</section>

<!-- LOCATION -->
<section>
<h2>📍 Location</h2>
<iframe src="https://www.google.com/maps?q=Mount+Carmel+Church+Ramapuram&output=embed"
width="100%" height="250"></iframe>
</section>

<footer class="footer">
புனித கார்மல் அன்னையே எங்களுக்காக வேண்டிக்கொள்ளும்
</footer>

<script>
// SIDEBAR
function openMenu() {
    document.getElementById("sidebar").style.width = "250px";
}
function closeMenu() {
    document.getElementById("sidebar").style.width = "0";
}

// NIGHT MODE
function toggleMode() {
    document.body.classList.toggle("dark");
    document.body.classList.toggle("light");
}

// COUNTDOWN JULY 16
function getNextFeast(){
    let now=new Date();
    let year=now.getFullYear();
    let feast=new Date(year,6,16);
    if(now>feast) feast=new Date(year+1,6,16);
    return feast.getTime();
}

let feastDate=getNextFeast();

setInterval(()=>{
let now=new Date().getTime();
let d=feastDate-now;

let days=Math.floor(d/(1000*60*60*24));
let h=Math.floor((d%(1000*60*60*24))/(1000*60*60));
let m=Math.floor((d%(1000*60*60))/(1000*60));
let s=Math.floor((d%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
days+"d "+h+"h "+m+"m "+s+"s";

},1000);
</script>

</body>
</html>
